<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TC Room Cell Calculator</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 20px; max-width: 500px; margin: auto; background-color: #f4f7f6; }
        h2 { color: #2c3e50; text-align: center; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        label { display: block; margin-top: 15px; font-weight: bold; color: #34495e; font-size: 14px; }
        input { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #bdc3c7; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        .grid-2x2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 5px; }
        button { width: 100%; padding: 12px; background-color: #3498db; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; margin-top: 20px; cursor: pointer; }
        button:active { background-color: #2980b9; }
        .danger { background-color: #e74c3c; margin-top: 10px;}
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 12px; }
        th, td { border: 1px solid #ddd; padding: 6px; text-align: center; word-break: break-all; }
        th { background-color: #ecf0f1; font-size: 11px; }
        .result-text { font-size: 16px; color: #27ae60; font-weight: bold; text-align: center; margin-top: 15px; background: #e8f8f5; padding: 10px; border-radius: 6px; display: none; }
        .error-text { color: #e74c3c; background: #fdedec; }
    </style>
</head>
<body>

    <h2>Cell Calculator</h2>

    <div class="card">
        <label>細胞株名稱 (Cell Line)</label>
        <input type="text" id="cellName" placeholder="e.g., KPC #2">

        <label>血球計數器四角細胞數 (Hemocytometer Counts)</label>
        <div class="grid-2x2">
            <input type="number" id="sq1" placeholder="左上 (Top-Left)" min="0">
            <input type="number" id="sq2" placeholder="右上 (Top-Right)" min="0">
            <input type="number" id="sq3" placeholder="左下 (Bottom-Left)" min="0">
            <input type="number" id="sq4" placeholder="右下 (Bottom-Right)" min="0">
        </div>

        <label>稀釋倍數 (Dilution Factor)</label>
        <input type="number" id="dilutionFactor" value="20" min="1">

        <label>目前懸浮液體積 V_init (ml)</label>
        <input type="number" id="volInit" value="2" step="0.1" min="0">

        <label>目標濃度 C_target (cells/ml)</label>
        <input type="number" id="targetConc" value="1000000" step="100000" min="0">

        <label>目標接種量 (Seeding Target, cells/well)</label>
        <input type="number" id="targetSeed" value="100000" step="10000" min="0">

        <button onclick="calculate()">計算並儲存 (Calculate & Save)</button>
        <div id="resultOutput" class="result-text"></div>
    </div>

    <div class="card">
        <h3 style="margin-top: 0; text-align: center; color: #2c3e50;">歷史紀錄 (History Log)</h3>
        <table id="historyTable">
            <thead>
                <tr>
                    <th>時間</th>
                    <th>細胞</th>
                    <th>原濃度<br>(cells/ml)</th>
                    <th>加 cDMEM<br>(ml)</th>
                    <th>Seeding<br>(μl)</th>
                </tr>
            </thead>
            <tbody id="historyBody"></tbody>
        </table>
        <button class="danger" onclick="clearHistory()">清除所有紀錄 (Clear All)</button>
    </div>

    <script>
        window.onload = function() { loadHistory(); };

        function calculate() {
            const name = document.getElementById("cellName").value || "Unknown";
            const sq1 = parseFloat(document.getElementById("sq1").value) || 0;
            const sq2 = parseFloat(document.getElementById("sq2").value) || 0;
            const sq3 = parseFloat(document.getElementById("sq3").value) || 0;
            const sq4 = parseFloat(document.getElementById("sq4").value) || 0;
            const df = parseFloat(document.getElementById("dilutionFactor").value) || 20;
            const V_init = parseFloat(document.getElementById("volInit").value) || 2;
            const C_target = parseFloat(document.getElementById("targetConc").value) || 1000000;
            const N_seed = parseFloat(document.getElementById("targetSeed").value) || 100000;

            const X = sq1 + sq2 + sq3 + sq4;
            const outputDiv = document.getElementById("resultOutput");
            outputDiv.style.display = "block";

            if (X === 0) { 
                outputDiv.className = "result-text error-text";
                outputDiv.innerHTML = "請輸入細胞計數數值"; 
                return; 
            }

            // 1. 計算原濃度 y = (X/4) * DF * 10^4
            const y = (X / 4) * df * 10000; 
            
            // 2. 計算總細胞數
            const totalCells = y * V_init;

            // 3. 計算目標總體積 (ml)
            const V_total = totalCells / C_target;

            // 4. 計算需要額外加入的培養基體積 (ml)
            const V_add = V_total - V_init;

            // 5. 計算 Seeding 體積 (μl)
            const V_seed = (N_seed / C_target) * 1000;

            if (V_add < 0) {
                outputDiv.className = "result-text error-text";
                outputDiv.innerHTML = `原濃度過低 (${y.toExponential(2)} cells/ml)<br>無法稀釋至 ${C_target.toExponential(2)} cells/ml<br>請重新離心濃縮細胞。`;
            } else {
                outputDiv.className = "result-text";
                outputDiv.innerHTML = `原濃度: ${y.toExponential(2)} cells/ml<br>
                                       請加入 <b>${V_add.toFixed(2)} ml</b> cDMEM<br>
                                       每 well 接種 <b>${V_seed.toFixed(1)} μl</b>`;
                
                // 將原濃度 y 以科學記號格式傳遞給儲存函數
                saveRecord(name, y.toExponential(2), V_add.toFixed(2), V_seed.toFixed(1));
            }
        }

        function saveRecord(name, origConc, vAdd, vSeed) {
            const now = new Date();
            const timeStr = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
            const record = { time: timeStr, name: name, conc: origConc, add: vAdd, seed: vSeed };
            
            let history = JSON.parse(localStorage.getItem("cellHistory")) || [];
            history.unshift(record); 
            if(history.length > 50) history.pop(); // 保留最近 50 筆
            localStorage.setItem("cellHistory", JSON.stringify(history));
            
            loadHistory();
        }

        function loadHistory() {
            let history = JSON.parse(localStorage.getItem("cellHistory")) || [];
            let tbody = document.getElementById("historyBody");
            tbody.innerHTML = "";
            history.forEach(r => {
                // 處理舊紀錄可能沒有 conc 屬性的狀況
                let displayConc = r.conc ? r.conc : "N/A";
                let tr = `<tr><td>${r.time}</td><td>${r.name}</td><td>${displayConc}</td><td>+ ${r.add}</td><td>${r.seed}</td></tr>`;
                tbody.innerHTML += tr;
            });
        }

        function clearHistory() {
            if (confirm("確定要清除所有紀錄嗎？(無法復原)")) {
                localStorage.removeItem("cellHistory");
                loadHistory();
                const outputDiv = document.getElementById("resultOutput");
                outputDiv.style.display = "none";
            }
        }
    </script>
</body>
</html>
